    /* v15 — Barcadia fantasy CMS visual skin. Cosmetic only. */
    :root{
      --bg:#090611;--bg2:#12091d;--panel:#100d18;--panel2:#1a1326;--panel3:#251a35;
      --line:#6f4d24;--line2:#b88a3b;--cyan:#8b5cf6;--blue:#38bdf8;--text:#fff7e8;
      --muted:#b9a993;--green:#65d98f;--red:#ff6b7f;--gold:#f5c66a;--purple:#a855f7;
      --ornate-gold:#c99a42;--ornate-dark:#07040c;--rune-blue:#40c7ff;
    }
    body{
      background:
        radial-gradient(circle at 50% -18%,rgba(245,198,106,.24),transparent 26%),
        radial-gradient(circle at 80% 10%,rgba(139,92,246,.18),transparent 28%),
        radial-gradient(circle at 5% 25%,rgba(56,189,248,.10),transparent 24%),
        linear-gradient(160deg,#07040c 0%,#100719 44%,#05060d 100%);
      color:var(--text);
    }
    body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:54px 54px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.08));}
    header{padding:0;border-bottom:1px solid rgba(201,154,66,.45);background:linear-gradient(180deg,rgba(8,5,14,.96),rgba(14,8,24,.92));box-shadow:0 12px 48px rgba(0,0,0,.45)}
    .topbar{max-width:1680px;padding:16px 24px;margin:0 auto;position:relative;}
    .topbar:after{content:"";position:absolute;left:24px;right:24px;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(245,198,106,.85),rgba(64,199,255,.55),rgba(245,198,106,.85),transparent)}
    .brand h1{font-family:Georgia, 'Times New Roman', serif;font-size:36px;line-height:1;font-weight:900;letter-spacing:.045em;text-transform:uppercase;color:#ffe7ae;text-shadow:0 0 18px rgba(245,198,106,.35),0 2px 0 #2a1404;margin:0;}

      linear-gradient(110deg,rgba(12,8,20,.92),rgba(34,20,47,.50),rgba(8,19,31,.86)),

<script>
const STORAGE_SECRET='barcodia_admin_secret';
const state={tab:'story',data:{},collapsed:{},selected:{story:0,characters:0,flags:0,quests:0,realms:0,items:0},filter:'',flagCategory:'All',archiveFilter:'All'};
const dataMap={story:'story_dialogues',characters:'story_characters',flags:'story_flags',quests:'story_quests',realms:'realm_locations',items:'story_items'};
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const slug=s=>String(s||'new').toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,60)||'new';
function asArray(v){if(Array.isArray(v))return v;if(!v)return [];if(Array.isArray(v.data))return v.data;if(typeof v==='object')return Object.values(v);return []}
function flattenRealmData(v){
  const raw = v && v.data !== undefined ? v.data : v;
  let realms = [];
  if(raw && Array.isArray(raw.realms)) realms = raw.realms;
  else if(Array.isArray(raw) && raw.length===1 && Array.isArray(raw[0]) && raw[0].some(x=>x && x.locations)) realms = raw[0];
  else if(Array.isArray(raw) && raw.some(x=>x && x.locations)) realms = raw;
  else if(Array.isArray(raw)) return raw;
  const out=[];
  realms.forEach(realm=>{
    (realm.locations||[]).forEach(loc=>out.push({...loc, realm_id: realm.id, realm_label: realm.label, realm_accent: realm.accent, location_id: loc.location_id||loc.id}));
  });
  return out;
}
function packRealmData(list){
  const real={id:'real',label:'Real World',short_label:'Real',accent:'#38BDF8',locations:[]};
  const fantasy={id:'fantasy',label:'Fantasy Realm',short_label:'Fantasy',accent:'#A855F7',locations:[]};
  asArray(list).forEach(loc=>{
    if(!loc || loc.archived) return;
    const clean={...loc};
    const realmId=clean.realm_id || clean.realm || ((clean.id||'').startsWith('whisper')?'fantasy':'real');
    delete clean.realm_id; delete clean.realm; delete clean.realm_label; delete clean.realm_accent; delete clean.__i;
    clean.id=clean.id||clean.location_id||slug(clean.name||'location');
    clean.location_id=clean.location_id||clean.id;
    clean.hotspots=asArray(clean.hotspots).filter(h=>!h.archived);
    (realmId==='fantasy'?fantasy.locations:real.locations).push(clean);
  });
  return {realms:[real,fantasy]};
}
function ensureDataArrays(){Object.values(dataMap).forEach(k=>{if(k!==dataMap.realms)state.data[k]=asArray(state.data[k])})}

function setStatus(msg,cls='ok'){$('status').className='status-pill '+cls;$('status').textContent=msg}
function getSecret(){return ($('secret')?.value||localStorage.getItem(STORAGE_SECRET)||'').trim()}
function toggleDevSecret(){$('devSecret').classList.toggle('open')}
async function api(path,opts={}){const headers={'Content-Type':'application/json',...(opts.headers||{})};const s=getSecret(); if(s) headers['X-Admin-Secret']=s; const res=await fetch('/api'+path,{...opts,headers}); if(!res.ok) throw new Error(await res.text()); return res.json()}
async function loadKey(key){try{const out=await api('/admin/data/'+key);state.data[key]=key===dataMap.realms?flattenRealmData(out.data):asArray(out.data);localStorage.setItem('barcodia_admin_cache_'+key,JSON.stringify(state.data[key]));return state.data[key]}catch(e){console.warn('Admin data file unavailable, using local fallback for',key,e);state.data[key]=key===dataMap.realms?flattenRealmData(JSON.parse(localStorage.getItem('barcodia_admin_cache_'+key)||'[]')):asArray(JSON.parse(localStorage.getItem('barcodia_admin_cache_'+key)||'[]'));return state.data[key]}}
async function saveKey(key){const payload=key===dataMap.realms?packRealmData(state.data[key]):asArray(state.data[key]);localStorage.setItem('barcodia_admin_cache_'+key,JSON.stringify(state.data[key]||[]));try{await api('/admin/data/'+key,{method:'PUT',body:JSON.stringify({data:payload})});setStatus('Saved '+niceKey(key),'ok')}catch(e){console.warn('Backend save unavailable for',key,e);setStatus('Saved locally; backend file missing for '+niceKey(key),'warn')}}
function niceKey(k){return k.replace(/^story_/,'').replace(/_/g,' ')}
async function boot(saveSecret=false){try{if(saveSecret&&$('secret'))localStorage.setItem(STORAGE_SECRET,$('secret').value.trim()); if($('secret')) $('secret').value=localStorage.getItem(STORAGE_SECRET)||''; setStatus('Connecting…','warn'); await Promise.all(Object.values(dataMap).map(loadKey)); seedDefaultLocations(); normalizeItems(); normalizeStory(); setStatus('Connected — local dev mode','ok'); try{render()}catch(renderErr){console.error(renderErr);setStatus('CMS render error — recovered','bad');$('leftPanel').innerHTML='<div class="pad"><h2 class="section-title">Recovered from CMS error</h2><p class="muted">A page render failed, but the admin shell is still loaded.</p></div>';$('mainPanel').innerHTML='<div class="empty"><h2>Render error</h2><p>'+esc(renderErr.message)+'</p></div>';$('rightPanel').innerHTML='<div class="pad"><button class="good" onclick="showTab(\'story\')">Back to Story Builder</button></div>'}}catch(e){setStatus('Backend blocked admin data','bad'); renderError(e)}}
function renderError(e){$('leftPanel').innerHTML='<div class="pad"><h2 class="section-title">Admin not connected</h2><p class="muted">The password UI is disabled, but your backend may still require ADMIN_SECRET.</p><button class="good" onclick="toggleDevSecret()">Enter secret once</button></div>';$('mainPanel').innerHTML='<div class="empty"><h2>Could not load admin data</h2><p>'+esc(e.message)+'</p></div>';$('rightPanel').innerHTML='<div class="pad hint">To fully remove auth, the FastAPI admin route needs a local-dev bypass. This HTML update hides the password and auto-connects with a saved secret when the backend requires one.</div>'}
function showTab(tab){state.tab=tab;document.querySelectorAll('.nav button[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));safeRender()}
function safeRender(){try{ensureDataArrays();render()}catch(renderErr){console.error(renderErr);setStatus('CMS render error — recovered','bad');$('leftPanel').innerHTML='<div class="pad"><h2 class="section-title">Recovered from CMS error</h2><p class="muted">A page render failed, but the admin shell is still loaded.</p></div>';$('mainPanel').innerHTML='<div class="empty"><h2>Render error</h2><p>'+esc(renderErr.message)+'</p></div>';$('rightPanel').innerHTML='<div class="pad"><button class="good" onclick="showTab(&quot;story&quot;)">Back to Story Builder</button></div>'}}
function render(){ensureDataArrays();if(!Object.keys(state.data).length){$('leftPanel').innerHTML='';$('mainPanel').innerHTML='<div class="empty"><h2>Loading Barcadia CMS…</h2></div>';$('rightPanel').innerHTML='';return}({story:renderStory,triggers:renderTriggers,flags:renderFlags,items:renderItems,quests:renderQuests,characters:renderCharacters,battles:renderBattles,realms:renderRealms,archive:renderArchive}[state.tab]||renderStory)()}
const helpText={
 story:{title:'How to use Story Builder',steps:['Use chapters to keep the game story organized. A chapter is just a folder/section for scenes.','Create one Story Scene for each moment that can happen in the game: Mom intro, window narration, forest discovery, pre-battle warning, post-battle result, etc.','Use Scene Setup to choose where the scene happens, who it belongs to, and what triggers it.','Use Dialogue Timeline to add dialogue, narration, and choices. Remove buttons remove the exact card. Up/down buttons reorder dialogue lines.','Use Show Only If to control story progression. Example: only show “Mom reacts to relic” if Forest Relic Found is true.','Use After Scene Completes for game changes after the player sees the scene: set flags, start quests, unlock locations, give items, or start battles.','Use Save Story Scene to save the current scene to memory and write the story file.']},
 triggers:{title:'How to use Trigger Builder',steps:['Triggers describe what causes content to happen. Example: tap an NPC, enter a location, inspect an object, use an item, complete a battle.','Use these as building blocks. Story scenes, quests, battles, and hotspots should all eventually point to trigger types.','Add new trigger types only when the game needs a new kind of player action.']},
 flags:{title:'How to use Flags / Conditions',steps:['Flags are story memory. They remember what the player has done.','Create readable flags like “Mom Intro Complete” or “Forest Relic Found.”','Conditions use flags to decide whether a scene, quest, hotspot, or battle should be available.','Use categories and search so this page stays usable when there are tons of flags.']},
 items:{title:'How to use Item Builder',steps:['Create game items here: key items, consumables, gear, weapons, armor, crafting materials, and quest items.','Use category and item type to keep the list clean as the game grows.','Hotspots and story effects can eventually give/remove these items by item ID.','Use Notes for design details until the final item/stat system is fully wired into gameplay.']},
 quests:{title:'How to use Quest Builder',steps:['Create Main, Side, or Event quests here.','Write the player-facing quest title and description.','Add objectives one per line for now. Later this can become objective cards.','Story effects can start, advance, or complete quests.']},
 characters:{title:'How to use Characters',steps:['Create NPCs, allies, enemies, and narrator/system characters here.','Characters appear in Story Builder speaker dropdowns.','Use notes/bio to track the character’s role, personality, and storyline purpose.','Portrait asset can remain a placeholder until image assets are finalized.']},
 battles:{title:'How to use Battles / Encounters',steps:['This page is the shell for RPG battle events.','A battle should eventually include enemies, pre-battle dialogue, win effects, loss effects, rewards, and post-battle story links.','Story Builder can later start battles through effects.']},
 realms:{title:'How to use Locations / Hotspots',steps:['Locations are places the player can visit. Hotspots are clickable areas inside those places.','Open or create a location, set its background image path, then click on the background preview to place a hotspot.','Hotspots are like the bed/computer icons: clickable regions on top of the background. They can inspect something, open dialogue, change scenes, give items, start quests, set flags, start battles, or run custom actions.','Hotspots save as percentages, not pixels, so they work on different screen sizes.']},
 archive:{title:'How to use Archive / Restore',steps:['Delete buttons now archive instead of permanently deleting.','Use this page to restore accidentally deleted story scenes, characters, flags, quests, or locations.','Permanent delete is intentionally harder and should only be used after you are sure the item is no longer needed.']}
};
function openHelp(tab=state.tab){const h=helpText[tab]||helpText.story;$('helpTitle').textContent=h.title;$('helpBody').innerHTML='<div class="help-steps">'+h.steps.map((x,i)=>`<div class="box"><h3>Step ${i+1}</h3><p class="muted">${esc(x)}</p></div>`).join('')+'</div>';$('helpModal').classList.add('open')}
function closeHelp(e){if(e&&e.target.id!=='helpModal')return;$('helpModal').classList.remove('open')}
function toggleChapter(ch){state.collapsed[ch]=!state.collapsed[ch];renderStoryList()}

function normalizeStory(){const arr=asArray(state.data[dataMap.story]);arr.forEach((d,idx)=>{d.id=d.id||('story_scene_'+idx);d.title=d.title||d.name||d.id;d.chapter=d.chapter||guessChapter(d);d.scene_type=d.scene_type||'Character Dialogue';d.enabled=d.enabled!==false;d.lines=d.lines||d.dialogue_lines||[];d.choices=d.choices||[];d.effects=d.effects||[];d.conditions=d.conditions||[];d.trigger_type=d.trigger_type||'tap_npc';d.priority=d.priority||100})}
function guessChapter(d){const loc=(d.location_id||'').toLowerCase(); if(loc.includes('forest')||loc.includes('whisper'))return 'Chapter 2 — Whisperwood'; return 'Chapter 1 — The Beginning'}
function storyItems(){const arr=asArray(state.data[dataMap.story]);const f=state.filter.toLowerCase();return arr.map((x,i)=>({...x,__i:i})).filter(x=>!x.archived).filter(x=>!f||[x.title,x.id,x.location_id,x.character_id,x.chapter].join(' ').toLowerCase().includes(f))}
function currentStory(){const arr=asArray(state.data[dataMap.story]);return arr[state.selected.story]&&!arr[state.selected.story].archived?arr[state.selected.story]:arr.find(x=>!x.archived)}
function renderStory(){renderStoryList();renderStoryMain();renderStoryDetails()}
function renderStoryList(){
 const items=storyItems();
 const groups={}; items.forEach(x=>{const ch=x.chapter||'Unsorted';(groups[ch]||(groups[ch]=[])).push(x)});
 $('leftPanel').innerHTML=`<div class="pad"><div class="chapters-head"><h2 class="section-title">Story Builder</h2><button class="small good" onclick="newStoryScene()">+ Scene</button></div><input class="search" placeholder="Search scenes, chapters, locations…" value="${esc(state.filter)}" oninput="state.filter=this.value;renderStoryList()"><div class="scene-tools"><button class="ghost small" onclick="newChapter()">+ New Chapter</button><button class="ghost small" onclick="openHelp('story')">How this works</button></div><div class="scene-list">${Object.keys(groups).map(ch=>{const open=!state.collapsed[ch];return `<div class="chapter-header" onclick="toggleChapter('${esc(ch)}')"><span>${open?'▾':'▸'} ${esc(ch)}</span><span class="chapter-count">${groups[ch].length} scene(s)</span></div><div class="chapter-body ${open?'':'collapsed'}">${groups[ch].map(x=>sceneCard(x,x.__i)).join('')}</div>`}).join('')||'<div class="empty-soft">No story scenes yet. Click + Scene to create one.</div>'}</div></div>`
}
function sceneCard(d,i){return `<div class="scene-card ${state.selected.story===i?'active':''}" onclick="state.selected.story=${i};renderStory()"><strong>${esc(d.title||d.id)}</strong><div class="hint tiny">${esc(humanLocation(d.location_id)||'Any location')} • ${esc(humanCharacter(d.character_id)||'Narrator/System')}</div><div class="meta"><span class="chip">${esc(triggerLabel(d.trigger_type))}</span><span class="chip ${d.enabled?'green':'red'}">${d.enabled?'Enabled':'Disabled'}</span>${(d.conditions||[]).length?`<span class="chip gold">${d.conditions.length} rule(s)</span>`:''}</div></div>`}
function renderStoryMain(){const d=currentStory(); if(!d){$('mainPanel').innerHTML='<div class="empty"><h2>No story scene selected</h2><button onclick="newStoryScene()">Create first scene</button></div>';return}$('mainPanel').innerHTML=`<div class="hero"><div class="hero-row"><div style="flex:1"><label>Story Scene Title</label><input class="title-input" id="s_title" value="${esc(d.title)}" oninput="softStorySave('title',this.value)"><div class="meta"><span class="chip">${esc(d.chapter)}</span><span class="chip">${esc(d.scene_type)}</span><span class="chip">${esc(triggerLabel(d.trigger_type))}</span></div></div><button class="danger" onclick="deleteStoryScene()">Delete</button></div></div><div class="pad"><div class="rows3"><div><label>Chapter</label><input id="s_chapter" value="${esc(d.chapter)}" oninput="softStorySave('chapter',this.value)"></div><div><label>Scene Type</label><select id="s_type" onchange="softStorySave('scene_type',this.value)">${opts(['Character Dialogue','Narration','Cutscene','Choice Branch','Battle Intro','Battle Result','Quest Moment'],d.scene_type)}</select></div><div><label>Enabled</label><select id="s_enabled" onchange="softStorySave('enabled',this.value==='true')"><option value="true">Enabled</option><option value="false">Disabled</option></select></div></div><div class="box"><div class="box-head"><h3>Attach This Story Scene To A Game Background</h3><button class="small" onclick="showTab('realms')">Open Locations / Hotspots</button></div><p class="hint">Pick the location/background in the right Scene Setup panel. Hotspots on that background can then launch this story scene.</p></div><div class="box"><div class="box-head"><h3>Dialogue Timeline</h3><div><button class="small" onclick="addLine('dialogue')">+ Dialogue</button> <button class="small" onclick="addLine('narration')">+ Narration</button> <button class="small" onclick="addChoice()">+ Player Choice / Branch</button></div></div><div class="timeline" id="timeline">${(d.lines||[]).map((l,i)=>lineCard(l,i)).join('')}${(d.choices||[]).map((c,i)=>choiceCard(c,i)).join('')||''}</div></div><div class="actions"><button class="good" onclick="commitStoryScene(true)">Save Story Scene</button><button onclick="commitStoryScene(true)">Save + Write File</button><button class="ghost" onclick="renderStory()">Refresh</button></div></div>`;$('s_enabled').value=String(d.enabled!==false)}
function opts(arr,val){return arr.map(x=>`<option ${x===val?'selected':''}>${esc(x)}</option>`).join('')}
function lineCard(l,i){const type=(l.type||'dialogue');const cls=type==='narration'?'narration-card':'';return `<div class="line-card ${cls}" data-line="${i}"><div class="line-top"><span class="speaker">${type==='narration'?'Narration':esc(l.speaker||'Speaker')}</span><div><button class="small ghost" onclick="moveLine(${i},-1)">↑</button> <button class="small ghost" onclick="moveLine(${i},1)">↓</button> <button class="small danger" onclick="removeLine(${i})">Remove</button></div></div><div class="rows"><div><label>Speaker</label><select class="lineSpeaker">${characterOptions(l.speaker||'Narrator')}</select></div><div><label>Emotion / Portrait Note</label><input class="linePortrait" value="${esc(l.portrait||l.emotion||'')}"></div></div><label>Line Text</label><textarea class="lineText">${esc(l.text||l.body||'')}</textarea><input type="hidden" class="lineType" value="${esc(type)}"></div>`}
function choiceCard(c,i){return `<div class="line-card choice-card" data-choice="${i}"><div class="line-top"><span class="speaker">Player Choice</span><button class="small danger" onclick="removeChoice(${i})">Remove</button></div><label>Choice Text</label><input class="choiceText" value="${esc(c.text||'')}"><label>Next Story Scene</label><select class="choiceNext">${storyOptions(c.next_id||'')}</select></div>`}
function characterOptions(selected){const chars=asArray(state.data[dataMap.characters]);const base=['Narrator','Player'];const options=[...base.map(x=>({id:x,name:x})),...chars];return options.map(c=>`<option value="${esc(c.id||c.name)}" ${(selected===(c.id||c.name)||selected===c.name)?'selected':''}>${esc(c.name||c.id)}</option>`).join('')}
function storyOptions(selected){const arr=asArray(state.data[dataMap.story]);return '<option value="">End / no branch</option>'+arr.map(s=>`<option value="${esc(s.id)}" ${selected===s.id?'selected':''}>${esc(s.title||s.id)}</option>`).join('')}
function humanCharacter(id){const c=(asArray(state.data[dataMap.characters])).find(x=>x.id===id||x.name===id);return c?.name||id}
function humanLocation(id){return id?String(id).split('/').pop().replace(/_/g,' ').replace(/\b\w/g,m=>m.toUpperCase()):''}
function triggerLabel(t){return ({tap_npc:'Tap NPC',enter_location:'Enter Location',inspect_object:'Inspect Object',item_found:'Item Found',quest_step:'Quest Step',battle_complete:'Battle Complete',use_item:'Use Item'}[t]||t||'Trigger')}
function collectTimeline(){return [...document.querySelectorAll('[data-line]')].map(el=>({type:el.querySelector('.lineType').value,speaker:el.querySelector('.lineSpeaker').value,portrait:el.querySelector('.linePortrait').value,text:el.querySelector('.lineText').value}))}
function collectChoices(){return [...document.querySelectorAll('[data-choice]')].map(el=>({text:el.querySelector('.choiceText').value,next_id:el.querySelector('.choiceNext').value})).filter(c=>c.text||c.next_id)}
function commitStoryScene(write=false){const d=currentStory(); if(!d)return; d.title=$('s_title')?.value||d.title; d.chapter=$('s_chapter')?.value||d.chapter; d.scene_type=$('s_type')?.value||d.scene_type; d.enabled=$('s_enabled')?.value!=='false'; d.lines=collectTimeline(); d.choices=collectChoices(); d.id=d.id||slug(d.title); if(write){commitDetails(); return saveKey(dataMap.story).then(renderStory)} return d}
function softStorySave(k,v){const d=currentStory(); if(d)d[k]=v}
function addLine(type='dialogue'){commitStoryScene(false);const d=currentStory();d.lines=d.lines||[];d.lines.push({type:type==='narration'?'narration':'dialogue',speaker:type==='narration'?'Narrator':'Player',portrait:'',text:''});renderStoryMain()}
function removeLine(i){commitStoryScene(false);currentStory().lines.splice(i,1);renderStoryMain()}
function moveLine(i,dir){commitStoryScene(false);const a=currentStory().lines,j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];renderStoryMain()}
function addChoice(){commitStoryScene(false);const d=currentStory();d.choices=d.choices||[];d.choices.push({text:'',next_id:''});renderStoryMain()}
function removeChoice(i){commitStoryScene(false);currentStory().choices.splice(i,1);renderStoryMain()}
function newStoryScene(){const a=state.data[dataMap.story];const title='New Story Scene';a.push({id:'story_scene_'+Date.now(),title,chapter:'Chapter 1 — The Beginning',scene_type:'Character Dialogue',enabled:true,location_id:'',character_id:'',trigger_type:'tap_npc',priority:100,conditions:[],lines:[{type:'dialogue',speaker:'Narrator',portrait:'',text:''}],choices:[],effects:[]});state.selected.story=a.length-1;renderStory()}
function newChapter(){const name=prompt('Chapter name?','Chapter '+(new Set((asArray(state.data[dataMap.story])).map(x=>x.chapter)).size+1)); if(!name)return; const a=state.data[dataMap.story];a.push({id:slug(name)+'_start_'+Date.now(),title:name+' Opening Scene',chapter:name,scene_type:'Narration',enabled:true,location_id:'',character_id:'',trigger_type:'enter_location',priority:100,conditions:[],lines:[{type:'narration',speaker:'Narrator',portrait:'',text:''}],choices:[],effects:[]});state.selected.story=a.length-1;renderStory()}
function deleteStoryScene(){archiveItem(dataMap.story,state.selected.story,'story scene',()=>{state.selected.story=0;renderStory()})}
function renderStoryDetails(){const d=currentStory(); if(!d){$('rightPanel').innerHTML='';return}const locs=asArray(state.data[dataMap.realms]);$('rightPanel').innerHTML=`<div class="pad"><div class="toolbar"><h2 class="section-title">Scene Setup</h2><button class="small" onclick="openHelp('story')">?</button></div><div class="box"><h3>Where / Who / When</h3><label>Location / Background Scene</label><select id="detail_location" onchange="currentStory().location_id=this.value"><option value="">Any location / not attached yet</option>${locs.map(l=>`<option value="${esc(l.id||l.location_id||l.name)}" ${(d.location_id===(l.id||l.location_id||l.name))?'selected':''}>${esc(l.name||l.title||l.id||l.location_id)}</option>`).join('')}</select><div class="hint">This attaches the story scene to an actual Barcadia location/background. Create/edit locations and clickable areas in Locations / Hotspots.</div><label>Primary Character</label><select id="detail_char" onchange="currentStory().character_id=this.value"><option value="">Narrator / System</option>${(asArray(state.data[dataMap.characters])).map(c=>`<option value="${esc(c.id)}" ${d.character_id===c.id?'selected':''}>${esc(c.name||c.id)}</option>`).join('')}</select><label>Trigger</label><select id="detail_trigger" onchange="currentStory().trigger_type=this.value">${opts(['tap_npc','enter_location','inspect_object','use_item','quest_step','battle_complete','hotspot_click'],d.trigger_type||'tap_npc')}</select></div><div class="box"><div class="box-head"><h3>Show Only If</h3><button class="small" onclick="addCondition()">+ Rule</button></div><div id="conditions">${(d.conditions||[]).map((c,i)=>conditionRow(c,i)).join('')||'<p class="hint">No conditions. This scene can appear normally.</p>'}</div></div><div class="box"><div class="box-head"><h3>After Scene Completes</h3><button class="small" onclick="addEffect()">+ Effect</button></div><div id="effects">${(d.effects||[]).map((e,i)=>effectRow(e,i)).join('')||'<p class="hint">No completion effects yet.</p>'}</div></div><div class="box"><h3>Mini Story Flow</h3><div class="flow">${storyFlowHtml()}</div></div></div>`}
function conditionRow(c,i){return `<div class="box"><label>Flag / Story State</label><select class="condFlag">${flagOptions(c.flag)}</select><div class="rows"><div><label>Operator</label><select class="condOp">${opts(['equals','not_equals','greater_than','less_than','contains'],c.operator||'equals')}</select></div><div><label>Value</label><input class="condVal" value="${esc(String(c.value??true))}"></div></div><button class="small danger" onclick="removeCondition(${i})">Remove Rule</button></div>`}
function effectRow(e,i){return `<div class="box"><label>Action</label><select class="effType">${opts(['set_flag','give_item','remove_item','unlock_location','start_quest','advance_quest','complete_quest','start_battle'],e.type||'set_flag')}</select><div class="rows"><div><label>Target</label><input class="effTarget" value="${esc(e.flag||e.quest||e.item_id||e.location_id||e.battle_id||'')}"></div><div><label>Value</label><input class="effValue" value="${esc(String(e.value??true))}"></div></div><button class="small danger" onclick="removeEffect(${i})">Remove Effect</button></div>`}
function parseVal(v){if(v==='true')return true;if(v==='false')return false;if(!isNaN(Number(v))&&v.trim()!=='')return Number(v);return v}
function commitDetails(){const d=currentStory(); if(!d)return;d.location_id=$('detail_location')?.value||'';d.character_id=$('detail_char')?.value||'';d.trigger_type=$('detail_trigger')?.value||'tap_npc';d.conditions=[...document.querySelectorAll('#conditions > .box')].map(el=>({flag:el.querySelector('.condFlag').value,operator:el.querySelector('.condOp').value,value:parseVal(el.querySelector('.condVal').value)})).filter(c=>c.flag);d.effects=[...document.querySelectorAll('#effects > .box')].map(el=>{const type=el.querySelector('.effType').value,target=el.querySelector('.effTarget').value,value=parseVal(el.querySelector('.effValue').value);const o={type,value}; if(type.includes('quest'))o.quest=target; else if(type.includes('item'))o.item_id=target; else if(type.includes('location'))o.location_id=target; else if(type.includes('battle'))o.battle_id=target; else o.flag=target; return o}).filter(e=>e.flag||e.quest||e.item_id||e.location_id||e.battle_id)}
function addCondition(){commitDetails();currentStory().conditions.push({flag:'',operator:'equals',value:true});renderStoryDetails()}
function removeCondition(i){commitDetails();currentStory().conditions.splice(i,1);renderStoryDetails()}
function addEffect(){commitDetails();currentStory().effects.push({type:'set_flag',flag:'',value:true});renderStoryDetails()}
function removeEffect(i){commitDetails();currentStory().effects.splice(i,1);renderStoryDetails()}
function storyFlowHtml(){const arr=(asArray(state.data[dataMap.story])).slice(0,9);return arr.map((s,i)=>`<div class="flow-node"><span class="dot"></span><span class="${s===currentStory()?'ok':''}">${esc(s.title||s.id)}</span></div>${i<arr.length-1?'<div class="arrow"></div>':''}`).join('')}
function renderTriggers(){$('leftPanel').innerHTML='<div class="pad"><div class="toolbar"><h2 class="section-title">Trigger Builder</h2><button class="small" onclick="openHelp(\'triggers\')">?</button></div><p class="muted">Reusable trigger types for story, quests, battles, and hotspots.</p></div>';$('mainPanel').innerHTML=`<div class="pad"><h2 class="section-title">Trigger Library</h2>${['Tap NPC','Enter Location','Inspect Object / Hotspot','Use Item','Quest Step Reached','Battle Complete','Story Flag Changed'].map(t=>`<div class="box"><h3>${t}</h3><p class="hint">This trigger can be attached to story scenes, hotspots, battles, and quest steps.</p></div>`).join('')}</div>`;$('rightPanel').innerHTML='<div class="pad"><h2 class="section-title">Coming Next</h2><p class="muted">This section is the framework for adding more trigger types later without redesigning Story Builder.</p></div>'}
function simpleList(items,labelFn,tab){return `<div class="list">${items.map((it,i)=>`<div class="item ${state.selected[tab]===i?'active':''}" onclick="state.selected.${tab}=${i};render()"><strong>${esc(labelFn(it))}</strong><span>${esc(it.id||'item '+(i+1))}</span></div>`).join('')}</div>`}
function flagCategories(){const cats=['All',...new Set((asArray(state.data[dataMap.flags])).filter(f=>!f.archived).map(f=>f.category||'Story').filter(Boolean))];return cats}
function renderFlags(){
 const key=dataMap.flags;
 const all=(state.data[key]||[]).filter(x=>!x.archived);
 const cats=flagCategories();
 if(!cats.includes(state.flagCategory)) state.flagCategory='All';

const DEFAULT_BACKGROUNDS=[
 {id:'bedroom',realm_id:'real',name:'Bedroom',image:'asset:realms/bedroom_clean.png',description:'Real-world bedroom background used for bed/computer/window hotspots.'},
 {id:'bedroom_window',realm_id:'real',name:'Bedroom Window',image:'asset:realms/bedroom_window_day.png',description:'Bedroom window view background.'},

];

 DEFAULT_BACKGROUNDS.forEach(def=>{
   const existing=a.find(x=>(x.id||x.location_id)===def.id || slug(x.name||'')===def.id);
   if(existing){
     existing.id=def.id; existing.location_id=def.id; existing.name=def.name;
     existing.image=(!existing.image||existing.image.includes('assets/images/')||existing.image.includes('backgrounds/'))?def.image:existing.image; existing.image_asset=existing.image;
     existing.description=existing.description||def.description; existing.preset=true; existing.hotspots=existing.hotspots||[];
   }else{
     a.push({...def,location_id:def.id,hotspots:[],preset:true});
   }
 });

function currentRealm(){const a=asArray(state.data[dataMap.realms]).filter(x=>!x.archived);return a[state.selected.realms||0]||a[0]}
function normalizeRealm(r){if(!r)return;r.id=r.id||r.location_id||slug(r.name||r.title||'location')+'_'+Date.now();r.location_id=r.location_id||r.id;r.name=r.name||r.title||r.id;r.description=r.description||'';r.image=r.image||r.image_asset||r.background||defaultBgFor(r).image||'';r.hotspots=r.hotspots||[];r.hotspots.forEach((h,i)=>{h.id=h.id||('hotspot_'+i);h.label=h.label||h.name||h.id;h.x_pct=Number(h.x_pct??h.x??20);h.y_pct=Number(h.y_pct??h.y??20);h.width_pct=Number(h.width_pct??h.w??18);h.height_pct=Number(h.height_pct??h.h??12);h.action_type=h.action_type||'inspect';})}
function defaultBgFor(r){const id=(r?.id||r?.location_id||slug(r?.name||'')).toLowerCase();return DEFAULT_BACKGROUNDS.find(b=>b.id===id)||DEFAULT_BACKGROUNDS.find(b=>slug(b.name)===id)||{};}

function applyBackgroundPreset(id){const def=DEFAULT_BACKGROUNDS.find(x=>x.id===id);if(!def)return;const r=currentRealm();Object.assign(r,{id:def.id,location_id:def.id,name:def.name,image:def.image,image_asset:def.image,description:r.description||def.description,preset:true});renderRealms()}
function bgPreviewKey(r){return 'barcodia_bg_preview_'+(r?.id||r?.location_id||slug(r?.name||'location'))}
function adminImageUrl(path){
 if(!path) return '';
 if(path.startsWith('http')||path.startsWith('data:')) return path;
 if(path.startsWith('asset:')) return '/assets/'+path.replace('asset:','');
 if(path.startsWith('/assets/')) return path;
 if(path.startsWith('assets/images/')) return '/assets/'+path.replace('assets/images/','');
 return path.startsWith('/') ? path : '/'+path;
}
function bgCandidates(r){
 const manual=(r?.image||r?.image_asset||'').trim();
 const def=defaultBgFor(r);
 const out=[];
 if(manual) out.push(adminImageUrl(manual));
 if(def.image) out.push(adminImageUrl(def.image));
 return [...new Set(out.filter(Boolean))];
}

 const local=localStorage.getItem(bgPreviewKey(r));
 const candidates=local?[local]:bgCandidates(r);
 const first=candidates[0]||'';
 return `<img class="real-bg" src="${esc(first)}" data-candidates='${esc(JSON.stringify(candidates))}' data-idx="0" onload="this.dataset.loaded='true';this.classList.add('loaded')" onerror="advanceBgCandidate(this)">`+
        `<div class="missing-bg" style="display:none"><strong>Actual background image is not reachable by the admin page.</strong><br><span>The hotspot editor will not use fake SVG art. Either serve the real game assets from FastAPI/static, correct the path above, or upload the actual image below for placement.</span><br><br><input type="file" accept="image/*" onclick="event.stopPropagation()" onchange="event.stopPropagation();setLocalBgPreview(this)"></div>`+
        (r.hotspots||[]).map((h,idx)=>h.archived?'':hotspotBox(h,idx)).join('');

function advanceBgCandidate(img){
 let list=[];try{list=JSON.parse(img.dataset.candidates||'[]')}catch(e){}
 let idx=Number(img.dataset.idx||0)+1;
 if(idx<list.length){img.dataset.idx=String(idx);img.src=list[idx];return;}
 img.style.display='none';
 const miss=img.parentElement&&img.parentElement.querySelector('.missing-bg');
 if(miss) miss.style.display='block';
 setStatus('Background image not served by admin — use real file upload or fix static path','warn');
}

function renderRealms(){const key=dataMap.realms,items=asArray(state.data[key]).filter(x=>!x.archived);items.forEach(normalizeRealm);let i=Math.min(state.selected.realms||0,Math.max(0,items.length-1));state.selected.realms=i;const r=items[i];$('leftPanel').innerHTML=`<div class="pad"><div class="toolbar"><h2 class="section-title">Locations</h2><button class="small" onclick="openHelp('realms')">?</button></div><p class="hint">Use actual game backgrounds, then place clickable bed/computer/item/story hotspots on top.</p><button class="good" onclick="newRealm()">+ Location</button><button class="ghost small" onclick="seedDefaultLocations();renderRealms()">Add Game Backgrounds</button>${simpleList(items,x=>x.name||x.title||x.id,'realms')||'<div class="empty-soft">No locations yet.</div>'}</div>`;if(!r){$('mainPanel').className='panel story-main locations-main';$('mainPanel').innerHTML='<div class="empty"><h2>No locations yet</h2><p>Create a location/background first. Then add hotspots to it.</p><button class="good" onclick="newRealm()">+ Location</button></div>';$('rightPanel').innerHTML='';return}$('mainPanel').className='panel story-main locations-main';$('mainPanel').innerHTML=`<div class="pad"><div class="location-titlebar"><div><div class="location-kicker">‹ Locations › ${esc(r.name||r.id)}</div><div class="location-heading"><span class="chip gold">📍</span><h2>${esc(r.name||r.id)}</h2></div></div><div class="actions" style="margin-top:0"><button class="ghost" onclick="state.selected.realms=0;renderRealms()">← Back to Locations</button><button class="good" onclick="saveRealm(${i})">💾 Save Location</button></div></div><div class="location-tabs"><button class="ghost small">⌂ Overview</button><button class="active small">☗ Hotspots</button><button class="ghost small" onclick="document.getElementById('locationDetailsPanel')?.setAttribute('open','open')">▧ Background</button><button class="ghost small" onclick="document.getElementById('locationDetailsPanel')?.setAttribute('open','open')">ⓘ Details</button><button class="ghost small">⚑ Flags</button></div><div class="hotspot-workbench"><div class="hotspot-workbench-head"><div><h3>Hotspot Placement</h3><p class="hint">Click a hotspot to select it. Drag to move. Use the Full Preview button for larger placement checks.</p></div><div class="actions" style="margin-top:0"><button class="small ghost" onclick="openPreviewModal()">⛶ Full Preview</button><button class="small good" onclick="addHotspot()">+ Hotspot</button></div></div><div class="stage-wide"><div class="hotspot-stage game-frame" onclick="stageAddHotspot(event)">${bgStageHtml(r)}</div></div></div>${hotspotSelectListHtml(r)}<details id="locationDetailsPanel" class="location-edit-collapsible"><summary>Background & Location Details</summary><div class="inside"><div class="box"><h3>Actual Game Background</h3><p class="hint">The hotspot preview must use the actual game background. If the image is blank, the admin server is not serving the asset path yet. Use local upload only for placement backup.</p><label>Known Background Preset</label><select onchange="applyBackgroundPreset(this.value)">${backgroundOptions(r.id||r.location_id)}</select><label>Try common asset paths</label><div class="actions">${bgPathButtons(r)}</div></div><div class="rows"><div><label>Location Name</label><input id="r_name" value="${esc(r.name||'')}"></div><div><label>Location ID</label><input id="r_id" value="${esc(r.id||'')}"></div></div><label>Saved Game Background Image Path</label><input id="r_image" value="${esc(r.image||'')}" placeholder="asset:realms/bedroom_clean.png"><div class="box"><h3>Actual Background Preview Upload</h3><p class="hint">Upload the actual game background here only if FastAPI cannot serve the image path yet.</p><input type="file" accept="image/*" onchange="setLocalBgPreview(this)"><div class="actions"><button class="ghost small" onclick="clearLocalBgPreview()">Clear Local Preview</button></div><p class="hint">${esc(bgPreviewLabel(r))}</p></div><label>Description</label><textarea id="r_desc">${esc(r.description||'')}</textarea><div class="actions"><button class="good" onclick="saveRealm(${i})">Save Location</button><button class="danger" onclick="deleteRealm(${i})">Archive Location</button><button onclick="saveKey('${key}')">Write File</button></div></div></details></div>`;renderHotspotDetails()}
function hotspotBox(h,i){const icon=h.icon||iconForAdminHotspot(h);return `<div class="hotspot-box ${(state.selected.hotspot||0)===i?'active':''}" onpointerdown="startHotspotDrag(event,${i})" onclick="event.stopPropagation();state.selected.hotspot=${i};renderHotspotDetails()" style="left:${h.x_pct}%;top:${h.y_pct}%;width:${h.width_pct||8}%;height:${h.height_pct||8}%"><span class="hotspot-pin" style="background:${esc(h.color||'rgba(14,165,233,.88)')}">${esc(icon)}</span><span class="hotspot-pin-label">${esc(h.label||h.id)}</span></div>`}
function iconForAdminHotspot(h){const a=h.action_type||'inspect';if(a==='open_computer')return '💻';if(a==='rest')return '🛏️';if(a==='change_scene')return '➜';if(a==='give_item')return '✦';if(a==='start_battle')return '⚔️';if(a==='open_dialogue')return '💬';return '✧'}
function hotspotSelectListHtml(r){const rows=(r.hotspots||[]).map((h,idx)=>({h,idx})).filter(o=>!o.h.archived);if(!rows.length)return '<div class="empty-soft">No hotspots yet. Click the background or press + Hotspot.</div>';return `<div class="hotspot-select-list"><h3 style="margin:4px 0 0">Hotspots on this location</h3>${rows.map(({h,idx})=>`<div class="hotspot-select-row ${(state.selected.hotspot||0)===idx?'active':''}"><button class="small ghost" onclick="state.selected.hotspot=${idx};renderRealms()">${esc(h.icon||iconForAdminHotspot(h))}</button><div><strong>${esc(h.label||h.id)}</strong><div class="hint tiny">${esc(actionLabel(h.action_type||'inspect'))} • x ${esc(h.x_pct)}%, y ${esc(h.y_pct)}%</div></div><button class="small danger" onclick="deleteHotspot(${idx})">Delete</button></div>`).join('')}</div>`}
let hotspotDrag=null;
function startHotspotDrag(e,i){e.preventDefault();e.stopPropagation();state.selected.hotspot=i;const stage=e.currentTarget.closest('.hotspot-stage');if(!stage)return;hotspotDrag={i,stage,moved:false};document.addEventListener('pointermove',moveHotspotDrag);document.addEventListener('pointerup',endHotspotDrag,{once:true});renderHotspotDetails()}
function moveHotspotDrag(e){if(!hotspotDrag)return;const r=currentRealm();const h=r?.hotspots?.[hotspotDrag.i];if(!h)return;const rect=hotspotDrag.stage.getBoundingClientRect();const x=((e.clientX-rect.left)/rect.width*100);const y=((e.clientY-rect.top)/rect.height*100);h.x_pct=Number(Math.max(0,Math.min(96,x)).toFixed(1));h.y_pct=Number(Math.max(0,Math.min(96,y)).toFixed(1));hotspotDrag.moved=true;const el=hotspotDrag.stage.querySelectorAll('.hotspot-box')[hotspotDrag.i];if(el){el.style.left=h.x_pct+'%';el.style.top=h.y_pct+'%'}if($('h_x'))$('h_x').value=h.x_pct;if($('h_y'))$('h_y').value=h.y_pct}
function endHotspotDrag(){if(hotspotDrag?.moved){saveKey(dataMap.realms).then(()=>setStatus('Hotspot moved + saved','ok'));}document.removeEventListener('pointermove',moveHotspotDrag);hotspotDrag=null;renderRealms()}

function renderHotspotDetails(){const r=currentRealm();if(!r){$('rightPanel').innerHTML='';return}r.hotspots=r.hotspots||[];const visibleHotspots=r.hotspots.map((h,idx)=>({...h,__idx:idx})).filter(h=>!h.archived);const vi=Math.min(state.selected.hotspot||0,Math.max(0,visibleHotspots.length-1));state.selected.hotspot=vi;const visibleHotspot=visibleHotspots[vi];const i=visibleHotspot?visibleHotspot.__idx:0;const h=r.hotspots[i];if(!h){$('rightPanel').innerHTML='<div class="pad"><h2 class="section-title">Hotspot Details</h2><p class="muted">No hotspots yet. Click the background or press + Hotspot.</p></div>';return}$('rightPanel').innerHTML=`<div class="pad"><h2 class="section-title">Hotspot Details</h2><div class="box"><label>Hotspot Label</label><input id="h_label" value="${esc(h.label||'')}"><label>Hotspot ID</label><input id="h_id" value="${esc(h.id||'')}"><div class="rows"><div><label>Fantasy Icon</label><input id="h_icon" value="${esc(h.icon||iconForAdminHotspot(h))}" placeholder="💬"></div><div><label>Magic Circle Color</label><input id="h_color" value="${esc(h.color||'rgba(14,165,233,.88)')}"></div></div><div class="hotspot-palette"><button class="small" onclick="setHotspotPreset('💬','rgba(14,165,233,.88)','open_dialogue')">Talk</button><button class="small" onclick="setHotspotPreset('➜','rgba(14,165,233,.88)','change_scene')">Travel</button><button class="small" onclick="setHotspotPreset('💻','rgba(14,165,233,.88)','open_computer')">Computer</button><button class="small" onclick="setHotspotPreset('🛏️','rgba(52,211,153,.92)','rest')">Rest</button><button class="small" onclick="setHotspotPreset('✦','rgba(251,191,36,.92)','give_item')">Item</button><button class="small" onclick="setHotspotPreset('⚔️','rgba(192,132,252,.92)','start_battle')">Battle</button></div><label>Player action when tapped</label><select id="h_action" onchange="setActionHelp()">${actionOptions(h.action_type||'inspect')}</select><div id="h_action_help" class="action-help">${esc(actionHelp(h.action_type||'inspect'))}</div><label>Linked Story Scene / Dialogue</label><select id="h_story"><option value="">None</option>${(asArray(state.data[dataMap.story])).filter(s=>!s.archived).map(s=>`<option value="${esc(s.id)}" ${(h.linked_dialogue||h.story_scene_id)===s.id?'selected':''}>${esc(s.title||s.id)}</option>`).join('')}</select><label>Linked Location / Scene Change Target</label><select id="h_location"><option value="">None</option>${(asArray(state.data[dataMap.realms])).filter(l=>!l.archived).map(l=>`<option value="${esc(l.id||l.location_id||l.name)}" ${h.linked_location===(l.id||l.location_id||l.name)?'selected':''}>${esc(l.name||l.title||l.id||l.location_id)}</option>`).join('')}</select><label>Linked Item / Quest / Battle</label><select id="h_item"><option value="">No item</option>${(asArray(state.data[dataMap.items])).filter(it=>!it.archived).map(it=>`<option value="${esc(it.id)}" ${(h.item_id||h.target_id)===it.id?'selected':''}>${esc(it.name||it.id)}</option>`).join('')}</select><input id="h_target" value="${esc(h.target_id||h.quest_id||h.battle_id||'')}" placeholder="Optional manual target ID: quest_intro, battle_slime_01"><div class="rows"><div><label>X %</label><input id="h_x" value="${esc(h.x_pct)}"></div><div><label>Y %</label><input id="h_y" value="${esc(h.y_pct)}"></div></div><div class="rows"><div><label>Width %</label><input id="h_w" value="${esc(h.width_pct)}"></div><div><label>Height %</label><input id="h_h" value="${esc(h.height_pct)}"></div></div><label>Condition Flag Required</label><select id="h_flag"><option value="">Always available</option>${(asArray(state.data[dataMap.flags])).filter(f=>!f.archived).map(f=>`<option value="${esc(f.id)}" ${(h.condition_flag||'')===f.id?'selected':''}>${esc(f.label||f.name||f.id)}</option>`).join('')}</select><div class="actions"><button class="good" onclick="saveHotspot(${i})">Save Hotspot</button><button class="danger" onclick="deleteHotspot(${i})">Delete Hotspot</button></div></div><div class="box"><h3>Examples</h3><p class="hint">Bed hotspot: action = rest. Computer hotspot: action = open_computer. Forest item: action = give_item + linked item. Door/path: action = change_scene + linked location. NPC/object: action = open_dialogue + linked story scene.</p></div></div>`}
function saveRealm(i){const visible=asArray(state.data[dataMap.realms]).filter(x=>!x.archived);const r=visible[i];if(!r)return;r.name=$('r_name').value;r.id=$('r_id').value||slug(r.name);r.location_id=r.id;r.image=$('r_image').value;r.image_asset=r.image;r.description=$('r_desc').value;saveKey(dataMap.realms).then(renderRealms)}
function newRealm(){const a=state.data[dataMap.realms];a.push({id:'new_location_'+Date.now(),name:'New Location',description:'',image:'',hotspots:[]});state.selected.realms=asArray(a).filter(x=>!x.archived).length-1;renderRealms()}
function deleteRealm(i){archiveItem(dataMap.realms,i,'location',()=>{state.selected.realms=0;renderRealms()})}
function addHotspot(){const r=currentRealm();if(!r)return;r.hotspots=r.hotspots||[];r.hotspots.push({id:'hotspot_'+Date.now(),label:'New Hotspot',x_pct:20,y_pct:20,width_pct:18,height_pct:12,action_type:'inspect',icon:'✧',color:'rgba(14,165,233,.88)',linked_dialogue:'',linked_location:'',condition_flag:''});state.selected.hotspot=r.hotspots.length-1;renderRealms()}
function stageAddHotspot(e){if(e.target.classList.contains('hotspot-box'))return;const stage=e.currentTarget,rect=stage.getBoundingClientRect();const x=((e.clientX-rect.left)/rect.width*100).toFixed(1),y=((e.clientY-rect.top)/rect.height*100).toFixed(1);const r=currentRealm();r.hotspots=r.hotspots||[];r.hotspots.push({id:'hotspot_'+Date.now(),label:'New Hotspot',x_pct:Math.max(0,Math.min(92,Number(x))),y_pct:Math.max(0,Math.min(92,Number(y))),width_pct:14,height_pct:10,action_type:'inspect',icon:'✧',color:'rgba(14,165,233,.88)'});state.selected.hotspot=r.hotspots.length-1;renderRealms()}
function saveHotspot(i){const r=currentRealm();const h=r.hotspots[i];h.label=$('h_label').value;h.id=$('h_id').value||slug(h.label);h.icon=$('h_icon')?.value||iconForAdminHotspot(h);h.color=$('h_color')?.value||'rgba(14,165,233,.88)';h.action_type=$('h_action').value;h.linked_dialogue=$('h_story').value;h.story_scene_id=h.linked_dialogue;h.linked_location=$('h_location').value;h.item_id=$('h_item').value;h.target_id=$('h_target').value||h.item_id;h.x_pct=Number($('h_x').value)||0;h.y_pct=Number($('h_y').value)||0;h.width_pct=Number($('h_w').value)||10;h.height_pct=Number($('h_h').value)||10;h.condition_flag=$('h_flag').value;saveKey(dataMap.realms).then(renderRealms)}
function deleteHotspot(i){const r=currentRealm();if(!r||!r.hotspots||!r.hotspots[i])return;if(!confirm('Delete this hotspot from this location?'))return;r.hotspots.splice(i,1);state.selected.hotspot=Math.max(0,i-1);saveKey(dataMap.realms).then(renderRealms)}

function flagOptions(selected){
  const flags=(asArray(state.data[dataMap.flags])).filter(f=>!f.archived);
  return '<option value="">Choose a flag...</option>'+flags.map(f=>`<option value="${esc(f.id)}" ${selected===f.id?'selected':''}>${esc(f.label||f.name||f.id)}</option>`).join('');
}
function activeItem(key,filteredIndex){
  const visible=(state.data[key]||[]).map((x,idx)=>({x,idx})).filter(o=>!o.x.archived);
  return visible[filteredIndex]?.x;
}
function activeIndex(key,filteredIndex){
  const visible=(state.data[key]||[]).map((x,idx)=>({x,idx})).filter(o=>!o.x.archived);
  return visible[filteredIndex]?.idx ?? filteredIndex;
}
function archiveItem(key,filteredIndex,type,after){
  const realIndex=activeIndex(key,filteredIndex);
  const item=(state.data[key]||[])[realIndex];
  if(!item)return;
  if(!confirm(`Archive this ${type}? You can restore it later from Archive / Restore.`))return;
  item.archived=true;
  item.archived_at=new Date().toISOString();
  item.archive_type=type;
  saveKey(key).then(()=>{setStatus(`Archived ${type}`,'warn'); if(after)after(); else render();});
}
function restoreArchived(key,realIndex,parentHotspotIndex=null){
  if(parentHotspotIndex!==null){
    const loc=(asArray(state.data[dataMap.realms]))[realIndex];
    if(loc&&loc.hotspots&&loc.hotspots[parentHotspotIndex]){
      loc.hotspots[parentHotspotIndex].archived=false;
      loc.hotspots[parentHotspotIndex].restored_at=new Date().toISOString();
      saveKey(dataMap.realms).then(renderArchive);
    }
    return;
  }
  const item=(state.data[key]||[])[realIndex];
  if(!item)return;
  item.archived=false;
  item.restored_at=new Date().toISOString();
  saveKey(key).then(renderArchive);
}
function permanentlyDeleteArchived(key,realIndex,parentHotspotIndex=null){
  if(!confirm('Permanently delete this archived item? This cannot be restored.'))return;
  if(parentHotspotIndex!==null){
    const loc=(asArray(state.data[dataMap.realms]))[realIndex];
    if(loc&&loc.hotspots) loc.hotspots.splice(parentHotspotIndex,1);
    saveKey(dataMap.realms).then(renderArchive);
    return;
  }
  (state.data[key]||[]).splice(realIndex,1);
  saveKey(key).then(renderArchive);
}
function archiveTypeLabel(r){return ({story:'Story Scene',characters:'Character',flags:'Flag',quests:'Quest',realms:'Location',items:'Item','story scene':'Story Scene',character:'Character',flag:'Flag',quest:'Quest',location:'Location',item:'Item',hotspot:'Hotspot'}[r.type]||r.type||'Archived Item')}
function archivedRows(){
  const rows=[];
  Object.entries(dataMap).forEach(([tab,key])=>{
    (state.data[key]||[]).forEach((item,idx)=>{
      if(item.archived) rows.push({key,idx,type:item.archive_type||tab,label:item.title||item.name||item.label||item.id||'(untitled)',when:item.archived_at||'',parent:''});
      if(key===dataMap.realms && item.hotspots){
        item.hotspots.forEach((h,hidx)=>{ if(h.archived) rows.push({key,idx,hidx,type:'hotspot',label:h.label||h.id,parent:item.name||item.id,when:h.archived_at||''}); });
      }
    });
  });
  return rows;
}
function renderArchive(){
  const all=archivedRows();
  const types=['All',...new Set(all.map(r=>archiveTypeLabel(r)))];
  if(!types.includes(state.archiveFilter)) state.archiveFilter='All';
  const rows=all.filter(r=>state.archiveFilter==='All'||archiveTypeLabel(r)===state.archiveFilter);
  $('leftPanel').innerHTML=`<div class="pad"><div class="toolbar"><h2 class="section-title">Archive</h2><button class="small" onclick="openHelp('archive')">?</button></div><p class="hint">Deleted things go here first. Filter by type so this stays readable when it grows.</p><label>Show Type</label><select onchange="state.archiveFilter=this.value;renderArchive()">${types.map(t=>`<option ${state.archiveFilter===t?'selected':''}>${esc(t)}</option>`).join('')}</select></div>`;
  const grouped={}; rows.forEach(r=>{const t=archiveTypeLabel(r);(grouped[t]||(grouped[t]=[])).push(r)});
  $('mainPanel').innerHTML=`<div class="pad"><h2 class="section-title">Archive / Restore</h2>${rows.length?Object.entries(grouped).map(([type,list])=>`<div class="box"><h3>${esc(type)} <span class="chip">${list.length}</span></h3>${list.map(r=>`<div class="item"><div class="toolbar"><div><strong>${esc(r.parent?`${r.parent} → ${r.label}`:r.label)}</strong><span>${esc(r.when||'archived')}</span></div><div><button class="small good" onclick="restoreArchived('${r.key}',${r.idx},${r.hidx??'null'})">Restore</button> <button class="small danger" onclick="permanentlyDeleteArchived('${r.key}',${r.idx},${r.hidx??'null'})">Permanent Delete</button></div></div></div>`).join('')}</div>`).join(''):'<div class="empty-soft">Archive is empty.</div>'}</div>`;
  $('rightPanel').innerHTML='<div class="pad"><h2 class="section-title">Safety Rule</h2><p class="muted">Normal Delete buttons archive instead of destroying data. Permanent delete is only available here.</p></div>';
}

window.addEventListener('DOMContentLoaded',()=>boot(false));
</script>
</body>
