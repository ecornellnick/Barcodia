<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Barcodia Admin — Story Builder</title>
  <style>
    :root{--bg:#07111f;--panel:#0b1828;--panel2:#101f33;--line:#24405f;--cyan:#38bdf8;--text:#eaf6ff;--muted:#99acc2;--green:#34d399;--red:#fb7185;--gold:#fbbf24}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(160deg,#020617,#07111f 45%,#0a1020);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
    header{padding:24px 28px;border-bottom:1px solid rgba(56,189,248,.22);background:rgba(2,6,23,.72);position:sticky;top:0;z-index:3;backdrop-filter:blur(12px)}
    h1{margin:0;font-size:26px;letter-spacing:.03em}.sub{margin-top:6px;color:var(--muted);font-weight:700}.wrap{max-width:1240px;margin:0 auto;padding:22px}
    .login,.card{border:1px solid rgba(56,189,248,.22);background:rgba(11,24,40,.84);border-radius:18px;box-shadow:0 22px 90px rgba(0,0,0,.28)}.login{padding:18px;margin-bottom:16px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end}.grid{display:grid;grid-template-columns:300px 1fr;gap:18px}.card{padding:16px}.tabs{display:flex;flex-direction:column;gap:10px}.tab{border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px;background:rgba(255,255,255,.04);color:var(--text);font-weight:900;text-align:left;cursor:pointer}.tab.active{border-color:rgba(56,189,248,.75);background:rgba(56,189,248,.16);box-shadow:0 0 24px rgba(56,189,248,.14)}
    label{display:block;color:#cfe8ff;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.09em;margin:12px 0 6px}input,select,textarea{width:100%;border:1px solid rgba(148,163,184,.25);border-radius:12px;background:#061020;color:var(--text);padding:11px;font:inherit;font-weight:700}textarea{min-height:84px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button{border:1px solid rgba(56,189,248,.45);background:rgba(14,165,233,.18);color:#e0f7ff;border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer}button.danger{border-color:rgba(251,113,133,.45);background:rgba(251,113,133,.12)}button.good{border-color:rgba(52,211,153,.45);background:rgba(52,211,153,.14)}button.small{padding:7px 10px;font-size:12px}.split{display:grid;grid-template-columns:1fr 1.3fr;gap:16px}.list{display:flex;flex-direction:column;gap:8px;max-height:640px;overflow:auto}.item{border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.035);padding:10px;border-radius:12px;cursor:pointer}.item.active{border-color:var(--cyan);background:rgba(56,189,248,.12)}.item strong{display:block}.item span,.hint{color:var(--muted);font-size:12px;font-weight:700}.pill{display:inline-flex;align-items:center;border:1px solid rgba(56,189,248,.35);border-radius:999px;padding:4px 8px;font-size:11px;color:#bae6fd;font-weight:900;margin:4px 4px 0 0}.section-title{font-size:18px;font-weight:1000;margin:0 0 8px}.muted{color:var(--muted)}.box{border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:12px;margin-top:12px;background:rgba(255,255,255,.03)}.status{margin-top:12px;font-weight:800}.ok{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--gold)}
    @media(max-width:900px){.grid,.split,.login,.row,.row3{grid-template-columns:1fr}.tabs{flex-direction:row;overflow:auto}.tab{white-space:nowrap}}
  </style>
</head>
<body>
  <header><h1>Barcodia Admin</h1><div class="sub">Story Builder foundation — characters, flags, dialogue events, quests, and realm data.</div></header>
  <main class="wrap">
    <section class="login">
      <div><label>Admin Secret</label><input id="secret" type="password" placeholder="ADMIN_SECRET from backend/.env" /></div>
      <button class="good" onclick="boot()">Connect</button>
    </section>
    <section class="grid">
      <aside class="card tabs">
        <button class="tab active" data-tab="dialogues" onclick="showTab('dialogues')">Dialogue Events</button>
        <button class="tab" data-tab="characters" onclick="showTab('characters')">Characters</button>
        <button class="tab" data-tab="flags" onclick="showTab('flags')">Flags / Conditions</button>
        <button class="tab" data-tab="quests" onclick="showTab('quests')">Quests</button>
        <button class="tab" data-tab="realms" onclick="showTab('realms')">Realm Locations</button>
        <div class="hint">Dialogue priority controls which matching event wins. Higher priority should be used for later story states.</div>
        <div id="status" class="status muted">Not connected.</div>
      </aside>
      <section class="card" id="panel"></section>
    </section>
  </main>
<script>
const state={tab:'dialogues',data:{},selected:{}};
const map={dialogues:'story_dialogues',characters:'story_characters',flags:'story_flags',quests:'story_quests',realms:'realm_locations'};
const $=id=>document.getElementById(id);
function secret(){return $('secret').value.trim()||localStorage.getItem('barcodia_admin_secret')||''}
function setStatus(msg,cls='muted'){$('status').className='status '+cls;$('status').textContent=msg}
async function api(path,opts={}){const res=await fetch('/api'+path,{...opts,headers:{'Content-Type':'application/json','X-Admin-Secret':secret(),...(opts.headers||{})}});if(!res.ok)throw new Error(await res.text());return res.json()}
async function loadKey(key){const out=await api('/admin/data/'+key);state.data[key]=out.data;return out.data}
async function saveKey(key){await api('/admin/data/'+key,{method:'PUT',body:JSON.stringify({data:state.data[key]})});setStatus('Saved '+key,'ok')}
function boot(){localStorage.setItem('barcodia_admin_secret',$('secret').value.trim());Promise.all(Object.values(map).map(loadKey)).then(()=>{setStatus('Connected','ok');render()}).catch(e=>setStatus(e.message,'bad'))}
function showTab(tab){state.tab=tab;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));render()}
function listEditor(items, labelFn, selectFn){return `<div class="list">${items.map((it,i)=>`<div class="item ${state.selected[state.tab]===i?'active':''}" onclick="selectItem(${i})"><strong>${labelFn(it)}</strong><span>${it.id||it.location_id||'item '+(i+1)}</span></div>`).join('')}</div>`}
function selectItem(i){state.selected[state.tab]=i;render()}
function val(id){const el=$(id); if(!el) return ''; if(el.type==='checkbox') return el.checked; return el.value}
function boolish(v){if(v==='true')return true;if(v==='false')return false;if(v==='')return '';return v}
function render(){if(!Object.keys(state.data).length){$('panel').innerHTML='<h2 class="section-title">Connect to begin</h2><p class="muted">Enter the backend ADMIN_SECRET.</p>';return}({dialogues:renderDialogues,characters:renderCharacters,flags:renderFlags,quests:renderQuests,realms:renderRealms}[state.tab])()}
function renderDialogues(){const key=map.dialogues,items=state.data[key]||[];let i=state.selected.dialogues??0;if(!items[i])i=0;const d=items[i]||{};$('panel').innerHTML=`<div class="split"><div><h2 class="section-title">Dialogue Events</h2><button onclick="newDialogue()">+ New Dialogue Event</button>${listEditor(items,x=>x.title||x.id||'Untitled')}</div><div><h2 class="section-title">Edit Event</h2><div class="row"><div><label>ID</label><input id="d_id" value="${esc(d.id||'')}"></div><div><label>Title</label><input id="d_title" value="${esc(d.title||'')}"></div></div><div class="row3"><div><label>Location ID</label><input id="d_location" value="${esc(d.location_id||'')}"></div><div><label>Character ID</label><input id="d_char" value="${esc(d.character_id||'')}"></div><div><label>Trigger</label><select id="d_trigger"><option>tap_npc</option><option>enter_location</option><option>inspect_object</option><option>item_found</option><option>quest_step</option></select></div></div><div class="row"><div><label>Priority</label><input id="d_priority" type="number" value="${d.priority||100}"></div><div><label>Condition summary</label><input id="d_condition_text" value="${esc((d.conditions||[]).map(c=>`${c.flag} ${c.operator} ${c.value}`).join('; '))}" placeholder="forest_item_found == true"></div></div><div class="box"><strong>Dialogue Lines</strong><div id="lineBox">${(d.lines||[]).map((l,idx)=>lineFields(l,idx)).join('')}</div><button class="small" onclick="addLine()">+ Add line</button></div><div class="box"><strong>Effects after completion</strong><div class="hint">Format: set_flag flag_id true</div><input id="d_effects" value="${esc((d.effects||[]).map(e=>`${e.type} ${e.flag||''} ${e.value}`).join('; '))}" placeholder="set_flag mom_intro_complete true"></div><div class="actions"><button class="good" onclick="saveDialogue(${i})">Save Event</button><button class="danger" onclick="deleteCurrent('${key}',${i})">Delete</button><button onclick="saveKey('${key}')">Write File</button></div></div></div>`;$('d_trigger').value=d.trigger_type||'tap_npc'}
function lineFields(l,idx){return `<div class="box line" data-idx="${idx}"><div class="row"><div><label>Speaker</label><input class="lineSpeaker" value="${esc(l.speaker||'Narrator')}"></div><div><label>Portrait asset</label><input class="linePortrait" value="${esc(l.portrait||'')}"></div></div><label>Text</label><textarea class="lineText">${esc(l.text||l.body||'')}</textarea></div>`}
function collectConditions(text){return text.split(';').map(x=>x.trim()).filter(Boolean).map(x=>{const m=x.match(/^([\w.:-]+)\s*(==|!=|>=|<=|>|<)\s*(.+)$/);return m?{flag:m[1],operator:m[2],value:boolish(m[3].trim())}:{raw:x}})}
function collectEffects(text){return text.split(';').map(x=>x.trim()).filter(Boolean).map(x=>{const p=x.split(/\s+/);return {type:p[0]||'set_flag',flag:p[1]||'',value:boolish(p.slice(2).join(' '))}})}
function addLine(){document.querySelector('#lineBox').insertAdjacentHTML('beforeend',lineFields({speaker:'Narrator',text:''},document.querySelectorAll('.line').length))}
function saveDialogue(i){const lines=[...document.querySelectorAll('.line')].map(el=>({speaker:el.querySelector('.lineSpeaker').value,portrait:el.querySelector('.linePortrait').value,text:el.querySelector('.lineText').value}));state.data[map.dialogues][i]={id:val('d_id'),title:val('d_title'),location_id:val('d_location'),character_id:val('d_char'),trigger_type:val('d_trigger'),priority:Number(val('d_priority')||100),conditions:collectConditions(val('d_condition_text')),lines,choices:[],effects:collectEffects(val('d_effects'))};saveKey(map.dialogues).then(render)}
function newDialogue(){const a=state.data[map.dialogues];a.push({id:'new_dialogue_'+Date.now(),title:'New Dialogue Event',location_id:'real_world/kitchen',character_id:'mom',trigger_type:'tap_npc',priority:100,conditions:[],lines:[{speaker:'Mom',portrait:'asset:characters/mom_avatar.png',text:''}],choices:[],effects:[]});state.selected.dialogues=a.length-1;render()}
function renderCharacters(){const key=map.characters,items=state.data[key]||[];let i=state.selected.characters??0;const c=items[i]||{};$('panel').innerHTML=`<div class="split"><div><h2 class="section-title">Characters</h2><button onclick="newCharacter()">+ New Character</button>${listEditor(items,x=>x.name||x.id)}</div><div><div class="row"><div><label>ID</label><input id="c_id" value="${esc(c.id||'')}"></div><div><label>Name</label><input id="c_name" value="${esc(c.name||'')}"></div></div><label>Portrait asset</label><input id="c_portrait" value="${esc(c.portrait||'')}"><div class="row"><div><label>Role</label><input id="c_role" value="${esc(c.role||'')}"></div><div><label>Notes</label><input id="c_notes" value="${esc(c.notes||'')}"></div></div><div class="actions"><button class="good" onclick="saveCharacter(${i})">Save Character</button><button class="danger" onclick="deleteCurrent('${key}',${i})">Delete</button><button onclick="saveKey('${key}')">Write File</button></div></div></div>`}
function saveCharacter(i){state.data[map.characters][i]={id:val('c_id'),name:val('c_name'),portrait:val('c_portrait'),role:val('c_role'),notes:val('c_notes')};saveKey(map.characters).then(render)}function newCharacter(){const a=state.data[map.characters];a.push({id:'new_character_'+Date.now(),name:'New Character',portrait:'',role:'',notes:''});state.selected.characters=a.length-1;render()}
function renderFlags(){const key=map.flags,items=state.data[key]||[];let i=state.selected.flags??0;const f=items[i]||{};$('panel').innerHTML=`<div class="split"><div><h2 class="section-title">Flags / Conditions</h2><button onclick="newFlag()">+ New Flag</button>${listEditor(items,x=>x.label||x.id)}</div><div><div class="row"><div><label>ID</label><input id="f_id" value="${esc(f.id||'')}"></div><div><label>Label</label><input id="f_label" value="${esc(f.label||'')}"></div></div><div class="row"><div><label>Type</label><select id="f_type"><option>boolean</option><option>number</option><option>string</option></select></div><div><label>Default</label><input id="f_default" value="${esc(String(f.default??false))}"></div></div><label>Notes</label><textarea id="f_notes">${esc(f.notes||'')}</textarea><div class="actions"><button class="good" onclick="saveFlag(${i})">Save Flag</button><button class="danger" onclick="deleteCurrent('${key}',${i})">Delete</button><button onclick="saveKey('${key}')">Write File</button></div></div></div>`;$('f_type').value=f.type||'boolean'}
function saveFlag(i){state.data[map.flags][i]={id:val('f_id'),label:val('f_label'),type:val('f_type'),default:boolish(val('f_default')),notes:val('f_notes')};saveKey(map.flags).then(render)}function newFlag(){const a=state.data[map.flags];a.push({id:'new_flag_'+Date.now(),label:'New Flag',type:'boolean',default:false,notes:''});state.selected.flags=a.length-1;render()}
function renderQuests(){const key=map.quests,items=state.data[key]||[];$('panel').innerHTML=`<h2 class="section-title">Quests</h2><p class="muted">Foundation list for later quest builder linking.</p><button onclick="state.data['${key}'].push({id:'new_quest_'+Date.now(),title:'New Quest',steps:[],flags:[]});saveKey('${key}').then(render)">+ Add Placeholder Quest</button>${listEditor(items,x=>x.title||x.id)}<div class="actions"><button onclick="saveKey('${key}')">Write File</button></div>`}
function renderRealms(){const key=map.realms;$('panel').innerHTML=`<h2 class="section-title">Realm Locations</h2><p class="muted">For now this remains safer as a structured preview. Use the data endpoint for deeper realm editing until the visual realm editor is expanded.</p><pre style="white-space:pre-wrap;background:#050b14;border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,.1);max-height:620px;overflow:auto">${esc(JSON.stringify(state.data[key],null,2))}</pre>`}
function deleteCurrent(key,i){if(!confirm('Delete this item?'))return;state.data[key].splice(i,1);state.selected[state.tab]=0;saveKey(key).then(render)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
render();
</script>
</body>
</html>
