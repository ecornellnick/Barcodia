<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Barcodia Admin</title>
  <style>
    :root{--bg:#0b0614;--panel:#180f27;--panel2:#10091b;--line:#3b2b55;--text:#f7f2ff;--muted:#a89ab8;--purple:#9737f2;--cyan:#21e4ff;--green:#30c977;--red:#ef4444;--gold:#ffd34d}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(135deg,#090512,#1d1030);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;font-weight:700}
    .wrap{display:grid;grid-template-columns:340px 1fr;gap:18px;padding:18px;min-height:100vh}.panel{background:rgba(20,11,34,.92);border:1px solid var(--line);border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.35);overflow:hidden}.side{padding:20px}.main{display:grid;grid-template-rows:auto 1fr}.h{font-size:18px;margin:0 0 14px}.input,.select,textarea{width:100%;background:#090510;color:var(--text);border:1px solid var(--line);border-radius:13px;padding:12px 14px;font:700 14px ui-monospace,SFMono-Regular,Menlo,monospace}textarea{min-height:520px;resize:vertical}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#2b1e3e;color:var(--text);border-radius:14px;padding:11px 15px;font-weight:900;cursor:pointer}.btn.primary{background:var(--purple);border-color:var(--purple)}.btn.green{background:#10351f;border-color:#1f8a4c}.btn.red{background:#3d1117;border-color:#8c2430}.btn:disabled{opacity:.45;cursor:not-allowed}.msg{margin:12px 0;padding:12px;border:1px solid var(--line);border-radius:12px;color:var(--muted);background:#0a0610}.msg.ok{border-color:#1a7b48;color:#b7ffd5}.msg.err{border-color:#8c2430;color:#ffc0c7}.list{display:grid;gap:10px;margin:14px 0}.file{padding:14px;border:1px solid #2d2340;border-radius:14px;background:#0d0716;cursor:pointer}.file.active{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(33,228,255,.3)}.file b{display:block;font-size:16px}.file span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.tabs{display:flex;gap:8px;padding:16px 18px;border-bottom:1px solid var(--line);background:rgba(31,18,50,.9);overflow:auto}.tab{white-space:nowrap}.toolbar{display:flex;justify-content:space-between;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);background:#160d25}.content{padding:18px;overflow:auto}.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field label{display:block;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1.4px;margin:0 0 7px}.full{grid-column:1/-1}.card{border:1px solid var(--line);border-radius:18px;background:rgba(8,5,14,.7);padding:16px;margin-bottom:16px}.mini{font-size:12px;color:var(--muted);line-height:1.4}.preview{width:84px;height:84px;border-radius:18px;border:1px solid var(--line);background:#07040d;display:flex;align-items:center;justify-content:center;overflow:hidden}.preview img{width:100%;height:100%;object-fit:cover}.assetGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px;margin-top:12px}.asset{border:1px solid var(--line);border-radius:14px;background:#0b0614;padding:8px;cursor:pointer;text-align:center}.asset.active{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(33,228,255,.3)}.asset img{width:64px;height:64px;object-fit:cover;border-radius:10px}.asset span{display:block;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}.hidden{display:none}@media(max-width:900px){.wrap{grid-template-columns:1fr}.formGrid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <aside class="panel side">
    <h2 class="h">Admin Login</h2>
    <input id="secret" class="input" type="password" placeholder="ADMIN_SECRET" />
    <div class="row" style="margin-top:12px"><button class="btn primary" onclick="unlock()">Unlock</button><button class="btn" onclick="forget()">Forget</button></div>
    <div id="loginMsg" class="msg">Enter ADMIN_SECRET from backend/.env.</div>
    <h2 class="h" style="margin-top:28px">Game Data</h2>
    <div id="files" class="list"></div>
    <h2 class="h" style="margin-top:24px">Summary</h2>
    <button class="btn" onclick="loadSummary()">Refresh Summary</button>
    <div id="summary" class="list"></div>
  </aside>

  <main class="panel main">
    <div class="tabs">
      <button class="btn tab" onclick="setMode('store')">Store Builder</button>
      <button class="btn tab" onclick="setMode('enemies')">Enemy Tools</button>
      <button class="btn tab" onclick="setMode('adventure')">Adventure Nodes</button>
      <button class="btn tab" onclick="setMode('assets')">Asset Manager</button>
      <button class="btn tab" onclick="setMode('json')">Raw JSON</button>
    </div>
    <div class="toolbar">
      <div><span id="currentBadge" class="msg" style="padding:8px 12px;margin:0;display:inline-block">No file selected</span></div>
      <div class="row"><button class="btn" onclick="formatJson()">Format JSON</button><button class="btn primary" onclick="saveCurrent()">Save</button></div>
    </div>
    <div class="content">
      <section id="mode-store" class="mode"></section>
      <section id="mode-enemies" class="mode hidden"></section>
      <section id="mode-adventure" class="mode hidden"></section>
      <section id="mode-assets" class="mode hidden"></section>
      <section id="mode-json" class="mode hidden"><textarea id="editor" spellcheck="false" placeholder="Select a data file on the left."></textarea></section>
      <div id="status" class="msg">Tip: use forms for common changes. Raw JSON is still available.</div>
    </div>
  </main>
</div>
<script>
let secret=localStorage.getItem('barcodia_admin_secret')||'';
let currentKey='store_gold';
let currentData=null;
let mode='store';
let allFiles=[];
let assetsCache={};
let storeDraft={item_type:'weapon',rarity:'common',gold_cost:100,slot:'main_hand',element:'none',enabled:true,can_appear_in_store:true,image:''};
let storeEditIndex=null;

const $=id=>document.getElementById(id);$('secret').value=secret;
const labels={enemies_shared:'Shared Enemies',enemies_quick_hunt:'Quick Hunt Enemies',enemies_tier_1_forest:'Tier 1 Forest Nodes',adventure_tiers:'Adventure Tiers',game_config:'Game Config',store_gold:'Gold Store Items'};
function jLabel(k){return labels[k]||k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}
async function j(url,opt={}){const r=await fetch(url,{...opt,headers:{...(opt.headers||{}),'X-Admin-Secret':secret}});const t=await r.text();let d;try{d=t?JSON.parse(t):{}}catch{d={detail:t}}if(!r.ok)throw new Error(d.detail||`HTTP ${r.status}`);return d}
function msg(t,ok=true){$('status').className='msg '+(ok?'ok':'err');$('status').textContent=t}
async function unlock(){secret=$('secret').value.trim();localStorage.setItem('barcodia_admin_secret',secret);try{await loadFiles();$('loginMsg').className='msg ok';$('loginMsg').textContent='Unlocked. Select a file to edit.';await selectFile(currentKey);await loadSummary()}catch(e){$('loginMsg').className='msg err';$('loginMsg').textContent=e.message}}
function forget(){localStorage.removeItem('barcodia_admin_secret');secret='';$('secret').value=''}
async function loadFiles(){const d=await j('/api/admin/data');allFiles=d.files||[];$('files').innerHTML=allFiles.map(f=>`<div class="file ${f.key===currentKey?'active':''}" onclick="selectFile('${f.key}')"><b>${jLabel(f.key)}</b><span>${f.path}</span></div>`).join('')}
async function selectFile(k){currentKey=k;await loadFiles().catch(()=>{});const d=await j('/api/admin/data/'+k);currentData=d.data;$('currentBadge').textContent=jLabel(k);$('editor').value=JSON.stringify(currentData,null,2);resetStoreDraft();renderForms();}
function setMode(m){mode=m;document.querySelectorAll('.mode').forEach(x=>x.classList.add('hidden'));$('mode-'+m).classList.remove('hidden');renderForms()}
function formatJson(){try{$('editor').value=JSON.stringify(JSON.parse($('editor').value),null,2);msg('Formatted JSON.')}catch(e){msg('Invalid JSON: '+e.message,false)}}
async function saveCurrent(){try{let data=mode==='json'?JSON.parse($('editor').value):currentData;await j('/api/admin/data/'+currentKey,{method:'PUT',body:JSON.stringify({data})});msg('Saved '+jLabel(currentKey));await selectFile(currentKey);await loadSummary()}catch(e){msg('Save failed: '+e.message,false)}}
async function loadSummary(){try{const d=await j('/api/admin/summary');$('summary').innerHTML=Object.entries(d.enemy_counts||{}).map(([k,v])=>`<div class="file"><b>${v}</b><span>${jLabel(k)}</span></div>`).join('')+`<div class="file"><b>${d.store_gold_items||0}</b><span>Gold Store Items</span></div>`}catch(e){$('summary').innerHTML=`<div class="msg err">${e.message}</div>`}}

const STAT_KEYS=['atk','int_stat','def_stat','res','dex','mob','crit','luk','hp','mana','stamina_restore','upgrade_xp_value'];
const TYPE_STATS={
  weapon:['atk','int_stat','dex','crit','luk'],
  armor:['def_stat','res','hp','mana','mob'],
  consumable:['hp','mana','stamina_restore'],
  trinket:['atk','int_stat','def_stat','res','dex','mob','crit','luk','hp','mana'],
  material:['upgrade_xp_value'],
};
function statFields(prefix='',keys=STAT_KEYS){return keys.map(k=>`<div class="field"><label>${k}</label><input class="input" type="number" id="${prefix}${k}" value="0"></div>`).join('')}
function getStats(prefix='',keys=STAT_KEYS){let o={};for(const k of keys)o[k]=parseInt($(prefix+k)?.value||'0');return o}
function bucketForItemType(t){return t==='weapon'?'items/weapons':t==='armor'?'items/armor':t==='trinket'?'items/trinkets':t==='material'?'items/materials':'items/consumables'}
function assetUrl(assetKey){if(!assetKey)return '';return assetKey.startsWith('asset:')?'/assets/'+assetKey.replace('asset:',''):assetKey}
function assetPreview(assetKey,id=''){let u=assetUrl(assetKey);return `<div class="preview" id="preview-${id}">${u?`<img src="${u}" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=mini>No preview</span>'">`:''}</div>`}
async function loadAssets(bucket){if(assetsCache[bucket])return assetsCache[bucket];const d=await j('/api/admin/assets?bucket='+encodeURIComponent(bucket));assetsCache[bucket]=d.assets||[];return assetsCache[bucket]}
async function assetPicker(targetId,bucket){try{const assets=await loadAssets(bucket);const current=$(targetId).value;const target=$('assetList-'+targetId);if(!assets.length){target.innerHTML='<div class="msg">No existing images found in '+bucket+'. Upload one first, then it will appear here.</div>';return msg('No existing images in '+bucket,false)}let html=`<div class="msg">Choose one existing image from <b>${bucket}</b>.</div><div class="assetGrid">`+assets.map(a=>`<div class="asset ${a.asset_key===current?'active':''}" onclick="pickAsset('${targetId}','${a.asset_key}')"><img src="${a.url}" onerror="this.style.display='none'"><span>${a.name}</span></div>`).join('')+`</div>`;target.innerHTML=html;msg('Choose an existing image from '+bucket)}catch(e){msg('Could not load assets: '+e.message,false)}}
function pickAsset(id,key){$(id).value=key;const p=$('preview-'+id);if(p)p.innerHTML=`<img src="${assetUrl(key)}" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=mini>No preview</span>'">`;const list=$('assetList-'+id);if(list)list.innerHTML='';syncStoreDraftFromForm(false);msg('Selected image '+key)}
async function uploadAsset(targetId,bucket){const input=$('upload-'+targetId);if(!input?.files?.[0])return msg('Choose an image first.',false);const fd=new FormData();fd.append('bucket',bucket);fd.append('file',input.files[0]);const r=await fetch('/api/admin/assets/upload',{method:'POST',headers:{'X-Admin-Secret':secret},body:fd});const d=await r.json();if(!r.ok)return msg(d.detail||'Upload failed',false);assetsCache[bucket]=null;$(targetId).value=d.asset_key;const p=$('preview-'+targetId);if(p)p.innerHTML=`<img src="${d.url}">`;syncStoreDraftFromForm(false);msg('Uploaded '+d.name)}
function imageField(id,label,bucket,hint){const val=$(id)?.value||storeDraft.image||'';return `<div class="field full"><label>${label} (${hint||'PNG/WebP'})</label><div class="row"><input class="input" id="${id}" value="${val}" placeholder="asset:${bucket}/file.png" style="flex:1;min-width:260px" onchange="syncStoreDraftFromForm(false)"><input id="upload-${id}" type="file" accept="image/png,image/jpeg,image/webp" class="input" style="flex:1;min-width:220px"><button class="btn" onclick="uploadAsset('${id}','${bucket}')">Upload New</button><button class="btn" onclick="assetPicker('${id}','${bucket}')">Choose Existing</button>${assetPreview(val,id)}</div><div class="mini" style="margin-top:6px">Folder: frontend/assets/images/${bucket}. Existing images load from this exact folder.</div><div id="assetList-${id}"></div></div>`}
function renderForms(){if(mode==='store')renderStore();if(mode==='enemies')renderEnemies();if(mode==='adventure')renderAdventure();if(mode==='assets')renderAssets()}

function resetStoreDraft(){storeEditIndex=null;storeDraft={item_type:'weapon',rarity:'common',gold_cost:100,slot:'main_hand',element:'none',enabled:true,can_appear_in_store:true,image:''}}
function defaultSlotForType(t){return t==='weapon'?'main_hand':t==='armor'?'chest':t==='trinket'?'trinket':t==='material'?'upgrade':'consumable'}
function iconForType(t){return t==='weapon'?'⚔️':t==='armor'?'🛡️':t==='trinket'?'🧿':t==='material'?'🔷':'🧪'}
function storeTypeOptions(selected){return ['weapon','armor','consumable','trinket','material'].map(t=>`<option value="${t}" ${selected===t?'selected':''}>${t.replace(/\b\w/g,c=>c.toUpperCase())}</option>`).join('')}
function slotOptions(type,selected){const groups={weapon:[['main_hand','Main Hand'],['off_hand','Off Hand']],armor:[['head','Head'],['chest','Chest'],['arm_l','Left Arm'],['arm_r','Right Arm'],['leg_l','Left Leg'],['leg_r','Right Leg']],consumable:[['consumable','Consumable']],trinket:[['trinket','Trinket'],['ring','Ring'],['necklace','Necklace']],material:[['upgrade','Upgrade Material']]};return (groups[type]||groups.consumable).map(([v,l])=>`<option value="${v}" ${selected===v?'selected':''}>${l}</option>`).join('')}
function syncStoreDraftFromForm(rerender=true){
  if(!$('st_type'))return;
  const type=$('st_type').value;
  const statKeys=TYPE_STATS[type]||[];
  storeDraft={...storeDraft,item_type:type,name:$('st_name')?.value||'',rarity:$('st_rarity')?.value||'common',gold_cost:parseInt($('st_cost')?.value||'0'),slot:$('st_slot')?.value||defaultSlotForType(type),element:$('st_element')?.value||'none',description:$('st_desc')?.value||'',image:$('st_image')?.value||'',enabled:$('st_enabled')?.checked??true,can_appear_in_store:$('st_store')?.checked??true,...getStats('st_',statKeys)};
  if(rerender)renderStore();
}
function changeStoreType(){syncStoreDraftFromForm(false);storeDraft.item_type=$('st_type').value;storeDraft.slot=defaultSlotForType(storeDraft.item_type);renderStore()}
function editStoreItem(i){storeEditIndex=i;storeDraft={...(currentData[i]||{})};for(const k of STAT_KEYS){if(storeDraft[k]===undefined && storeDraft.stats?.[k]!==undefined)storeDraft[k]=storeDraft.stats[k]}renderStore();msg('Editing '+(storeDraft.name||'store item')+'. Update fields then click Update Item.')}
function renderStore(){currentKey='store_gold';if(!Array.isArray(currentData))currentData=[];const type=storeDraft.item_type||'weapon';const statKeys=TYPE_STATS[type]||[];const bucket=bucketForItemType(type);const h=`<div class="card"><h2>${storeEditIndex===null?'Gold Store Item Builder':'Edit Store Item'}</h2><p class="mini">Choose an item type first. The form changes to show only relevant fields. Upload or choose an existing image from the correct asset folder.</p><div class="formGrid"><div class="field"><label>Item Type</label><select id="st_type" class="select" onchange="changeStoreType()">${storeTypeOptions(type)}</select></div><div class="field"><label>Name</label><input id="st_name" class="input" value="${storeDraft.name||''}" placeholder="Starter Healing Phial" onchange="syncStoreDraftFromForm(false)"></div><div class="field"><label>Rarity</label><select id="st_rarity" class="select" onchange="syncStoreDraftFromForm(false)">${['common','uncommon','rare','epic','legendary'].map(r=>`<option ${storeDraft.rarity===r?'selected':''}>${r}</option>`).join('')}</select></div><div class="field"><label>Gold Cost</label><input id="st_cost" class="input" type="number" value="${storeDraft.gold_cost??100}" onchange="syncStoreDraftFromForm(false)"></div><div class="field"><label>Slot</label><select id="st_slot" class="select" onchange="syncStoreDraftFromForm(false)">${slotOptions(type,storeDraft.slot||defaultSlotForType(type))}</select></div><div class="field"><label>Element</label><select id="st_element" class="select" onchange="syncStoreDraftFromForm(false)">${['none','fire','ice','lightning','holy','shadow','nature'].map(e=>`<option ${storeDraft.element===e?'selected':''}>${e}</option>`).join('')}</select></div>${statKeys.map(k=>`<div class="field"><label>${k}</label><input class="input" type="number" id="st_${k}" value="${storeDraft[k]??0}" onchange="syncStoreDraftFromForm(false)"></div>`).join('')}<div class="field"><label>Enabled</label><input id="st_enabled" type="checkbox" ${storeDraft.enabled!==false?'checked':''} onchange="syncStoreDraftFromForm(false)"></div><div class="field"><label>Appears In Store</label><input id="st_store" type="checkbox" ${storeDraft.can_appear_in_store!==false?'checked':''} onchange="syncStoreDraftFromForm(false)"></div><div class="field full"><label>Description</label><input id="st_desc" class="input" value="${storeDraft.description||''}" placeholder="What players see in the Store." onchange="syncStoreDraftFromForm(false)"></div><div id="st_image_wrap" class="full">${imageField('st_image','Item Image',bucket,'512x512 PNG/WebP')}</div></div><div class="row" style="margin-top:14px"><button class="btn primary" onclick="saveStoreItem()">${storeEditIndex===null?'Add Store Item':'Update Item'}</button><button class="btn" onclick="resetStoreDraft();renderStore()">Clear Form</button></div></div><div class="card"><h2>Current Store Items</h2>${currentData.map((x,i)=>`<div class="file"><b>${x.name||'Unnamed'} — 🪙 ${x.gold_cost||0}</b><span>${x.item_type||x.slot||'item'} · ${x.rarity||'common'} · ${x.image||'no image'}</span><div class="row" style="margin-top:10px"><button class="btn" onclick="editStoreItem(${i})">Edit</button><button class="btn red" onclick="removeStoreItem(${i})">Remove</button></div></div>`).join('')||'<div class="msg">No store items yet.</div>'}</div>`;$('mode-store').innerHTML=h;}
async function saveStoreItem(){try{syncStoreDraftFromForm(false);const type=storeDraft.item_type||'consumable';const item={...storeDraft,id:storeDraft.id || (type+'_'+Date.now()),icon:storeDraft.icon||iconForType(type),enabled:storeDraft.enabled!==false,can_appear_in_store:storeDraft.can_appear_in_store!==false};if(storeEditIndex===null)currentData.push(item);else currentData[storeEditIndex]=item;$('editor').value=JSON.stringify(currentData,null,2);await j('/api/admin/data/store_gold',{method:'PUT',body:JSON.stringify({data:currentData})});msg((storeEditIndex===null?'Added ':'Saved ')+(item.name||'store item')+' to the live Store.');resetStoreDraft();await selectFile('store_gold');}catch(e){msg('Store save failed: '+e.message,false)}}
async function removeStoreItem(i){try{if(storeEditIndex===i)resetStoreDraft();const removed=currentData[i]?.name||'item';currentData.splice(i,1);$('editor').value=JSON.stringify(currentData,null,2);await j('/api/admin/data/store_gold',{method:'PUT',body:JSON.stringify({data:currentData})});msg('Removed '+removed+' from the live Store.');await selectFile('store_gold');}catch(e){msg('Remove failed: '+e.message,false)}}

function renderEnemies(){if(!Array.isArray(currentData))currentData=[];$('mode-enemies').innerHTML=`<div class="card"><h2>Enemy Builder</h2><div class="formGrid"><div class="field"><label>Name</label><input id="en_name" class="input" placeholder="Briar Rat"></div><div class="field"><label>Enemy ID</label><input id="en_id" class="input" placeholder="briar_rat"></div><div class="field"><label>Tier</label><input id="en_tier" class="input" type="number" value="1"></div><div class="field"><label>Role</label><select id="en_role" class="select"><option>normal</option><option>elite</option><option>miniboss</option><option>boss</option></select></div>${statFields('en_',STAT_KEYS.filter(k=>k!=='upgrade_xp_value'&&k!=='stamina_restore'))}<div id="en_image_wrap" class="full"></div></div><div class="row" style="margin-top:14px"><button class="btn primary" onclick="addEnemy()">Add Enemy</button></div></div><div class="card"><h2>Current Records</h2>${currentData.map((x,i)=>`<div class="file"><b>${x.name||x.enemy_id||x.id}</b><span>${x.enemy_id||x.id||''} · ${x.role||''} · ${x.portrait||''}</span><button class="btn red" onclick="removeEnemy(${i})">Remove</button></div>`).join('')}</div>`;$('en_image_wrap').innerHTML=imageField('en_portrait','Enemy Portrait','enemies/tier_1_forest','768x768 PNG/WebP')}
function addEnemy(){const id=$('en_id').value||($('en_name').value||'enemy').toLowerCase().replaceAll(' ','_');currentData.push({enemy_id:id,id,name:$('en_name').value||id,tier:parseInt($('en_tier').value||'1'),role:$('en_role').value,portrait:$('en_portrait').value,...getStats('en_',STAT_KEYS.filter(k=>k!=='upgrade_xp_value'&&k!=='stamina_restore'))});$('editor').value=JSON.stringify(currentData,null,2);renderEnemies();msg('Added enemy. Click Save to persist.')}
function removeEnemy(i){currentData.splice(i,1);$('editor').value=JSON.stringify(currentData,null,2);renderEnemies()}
function renderAdventure(){if(!Array.isArray(currentData?.nodes)){$('mode-adventure').innerHTML='<div class="msg">Select Tier 1 Forest Nodes on the left to use this form.</div>';return}$('mode-adventure').innerHTML=`<div class="card"><h2>Tier Node Editor</h2><div class="formGrid"><div class="field"><label>Node</label><input id="nd_node" type="number" class="input" value="1"></div><div class="field"><label>Name</label><input id="nd_name" class="input" placeholder="Moss Trail"></div><div class="field"><label>Enemy ID</label><input id="nd_enemy" class="input" placeholder="green_slimeling"></div><div class="field"><label>Role</label><select id="nd_role" class="select"><option>normal</option><option>elite</option><option>miniboss</option><option>boss</option></select></div><div id="nd_image_wrap" class="full"></div></div><div class="row" style="margin-top:14px"><button class="btn primary" onclick="upsertNode()">Add/Update Node</button></div></div><div class="card"><h2>Nodes</h2>${currentData.nodes.map(n=>`<div class="file"><b>Node ${n.node}: ${n.name}</b><span>${n.role} · ${n.enemy_id} · ${n.portrait}</span></div>`).join('')}</div>`;$('nd_image_wrap').innerHTML=imageField('nd_portrait','Node Enemy Portrait','enemies/tier_1_forest','768x768 PNG/WebP')}
function upsertNode(){const n=parseInt($('nd_node').value||'1');const rec={node:n,name:$('nd_name').value||`Node ${n}`,enemy_id:$('nd_enemy').value||`enemy_${n}`,role:$('nd_role').value,portrait:$('nd_portrait').value};const i=currentData.nodes.findIndex(x=>Number(x.node)===n);if(i>=0)currentData.nodes[i]={...currentData.nodes[i],...rec};else currentData.nodes.push(rec);currentData.nodes.sort((a,b)=>a.node-b.node);$('editor').value=JSON.stringify(currentData,null,2);renderAdventure();msg('Updated node. Click Save to persist.')}
function renderAssets(){$('mode-assets').innerHTML=`<div class="card"><h2>Asset Manager</h2><p class="mini">Upload images into the correct folder. Use the returned asset key in item/enemy forms.</p><div class="formGrid"><div class="field"><label>Bucket</label><select id="am_bucket" class="select"><option>items/weapons</option><option>items/armor</option><option>items/consumables</option><option>items/materials</option><option>items/trinkets</option><option>enemies/tier_1_forest</option><option>enemies/shared</option><option>avatars</option><option>maps</option></select></div><div class="field"><label>Upload</label><input id="upload-am_asset" type="file" accept="image/png,image/jpeg,image/webp" class="input"></div></div><div class="row" style="margin-top:12px"><button class="btn primary" onclick="uploadAsset('am_asset',$('am_bucket').value)">Upload</button><button class="btn" onclick="assetPicker('am_asset',$('am_bucket').value)">Load Existing</button><input class="input" id="am_asset" placeholder="asset key appears here" style="flex:1"></div><div id="assetList-am_asset"></div></div>`}
if(secret)unlock().catch(()=>{});else fetch('/api/admin/status').then(r=>r.json()).then(d=>$('loginMsg').textContent=d.message||'Enter secret.');
</script>
</body>
</html>
